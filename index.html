<script>
/* ==========================
   DEVICE CHECK
========================== */
function isSupported() {
  const ua = navigator.userAgent;
  return /iPhone|iPad|Macintosh/.test(ua);
}

const supported = isSupported();

if (!supported) {
  document.getElementById("unsupported").style.display = "flex";
  document.getElementById("mainContent").style.display = "flex";
  
  const btn = document.querySelector(".main-btn");
  btn.style.opacity = "0.5";
  btn.style.pointerEvents = "none";
  btn.innerText = "iOS or iPadOS only";
}

/* ==========================
   SETTINGS PANEL
========================== */
function openSettings() {
  document.getElementById("settingsPanel").style.display = "flex";
}

function closeSettings() {
  document.getElementById("settingsPanel").style.display = "none";
}

/* ==========================
   THEME SYSTEM (iOS STYLE)
========================== */
const themeSelect = document.getElementById("themeSelect");

function applyTheme(theme) {
  document.body.classList.remove("dark");

  if (theme === "dark") {
    document.body.classList.add("dark");
  }

  localStorage.setItem("theme", theme);
}

themeSelect.addEventListener("change", () => {
  applyTheme(themeSelect.value);
});

const savedTheme = localStorage.getItem("theme") || "light";
themeSelect.value = savedTheme;
applyTheme(savedTheme);

/* ==========================
   BACKGROUND SYSTEM
========================== */
const defaultBG = "https://media.idownloadblog.com/wp-content/uploads/2017/06/iOS-10-3-3-wallpaper-1-iPad-AR72014.jpg";

const themes = {
  theme1: "theme1.jpg",
  theme2: "theme2.jpg",
  theme3: "theme3.jpg"
};

function applyBackground(bg) {
  let url = defaultBG;

  if (themes[bg]) {
    url = themes[bg];
  }

  document.body.style.backgroundImage = `url('${url}')`;
  localStorage.setItem("background", bg);
  localStorage.removeItem("backgroundCustom");
}

document.getElementById("bgSelect").addEventListener("change", (e) => {
  applyBackground(e.target.value);
});

const savedBG = localStorage.getItem("background") || "default";
document.getElementById("bgSelect").value = savedBG;
applyBackground(savedBG);

/* ==========================
   CUSTOM BACKGROUND (FILE)
========================== */
document.getElementById("fileInput").addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    document.body.style.backgroundImage = `url('${e.target.result}')`;
    localStorage.setItem("backgroundCustom", e.target.result);
    localStorage.removeItem("background");
  };
  reader.readAsDataURL(file);
});

/* ==========================
   CUSTOM BACKGROUND (URL)
========================== */
function customBackgroundURL() {
  const url = prompt("Enter image URL:");
  if (!url) return;

  document.body.style.backgroundImage = `url('${url}')`;
  localStorage.setItem("backgroundCustom", url);
  localStorage.removeItem("background");
}

/* Restore custom BG */
const customBG = localStorage.getItem("backgroundCustom");
if (customBG) {
  document.body.style.backgroundImage = `url('${customBG}')`;
}
</script>
