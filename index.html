<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Star</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="Web-icon.JPEG">
<link rel="apple-touch-icon" href="Web-icon.JPEG">
</head>

<body>

<!-- Unsupported -->
<div id="unsupported">
  <div class="unsupported-card">
    <h2>Not Supported</h2>
    <p>Please visit on iOS, iPadOS, or macOS.</p>
    <p>Thanks for your attention ✨</p>
  </div>
</div>

<!-- Main -->
<div class="container" id="mainContent">
  <div class="card">

    <h1>Star</h1>

    <a href="#" class="main-btn" id="mainBtn">Get Star</a>

    <button class="settings-btn" onclick="openSettings()">Settings</button>

    <p class="version">
      v1.0 Beta 2<br>
      © <a href="#">Endlesspete</a> |
      © <a href="#">Terralinkslabs</a> |
      © <a href="#">Skylark Inc</a>
    </p>

  </div>
</div>

<!-- Settings -->
<div id="settingsPanel">
  <div class="settings-card">

    <h2>Settings</h2>

    <label>Theme</label>
    <select id="themeSelect">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>

    <label>Background</label>
    <select id="bgSelect">
      <option value="default">Default</option>
      <option value="theme1">Theme 1</option>
      <option value="theme2">Theme 2</option>
      <option value="theme3">Theme 3</option>
    </select>

    <label>Custom Background</label>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="customBackgroundURL()">Use Image URL</button>

    <button class="close-btn" onclick="closeSettings()">Close</button>

  </div>
</div>

<script>
function isSupported() {
  return /iPhone|iPad|Macintosh/.test(navigator.userAgent);
}

const supported = isSupported();
const mainBtn = document.getElementById("mainBtn");

if (!supported) {
  document.getElementById("unsupported").style.display = "flex";
  document.getElementById("mainContent").style.display = "none";
} else {
  document.getElementById("unsupported").style.display = "none";
}

function openSettings() {
  document.getElementById("settingsPanel").style.display = "flex";
}

function closeSettings() {
  document.getElementById("settingsPanel").style.display = "none";
}

/* Theme */
const themeSelect = document.getElementById("themeSelect");

function applyTheme(theme) {
  document.body.classList.toggle("dark", theme === "dark");
  localStorage.setItem("theme", theme);
}

themeSelect.addEventListener("change", () => {
  applyTheme(themeSelect.value);
});

const savedTheme = localStorage.getItem("theme") || "light";
themeSelect.value = savedTheme;
applyTheme(savedTheme);

/* Background */
const defaultBG = "https://media.idownloadblog.com/wp-content/uploads/2017/06/iOS-10-3-3-wallpaper-1-iPad-AR72014.jpg";

const themes = {
  theme1: "theme1.jpg",
  theme2: "theme2.jpg",
  theme3: "theme3.jpg"
};

function applyBackground(bg) {
  let url = defaultBG;

  if (themes[bg]) url = themes[bg];

  document.body.style.backgroundImage = `url('${url}')`;

  localStorage.setItem("background", bg);
  localStorage.removeItem("backgroundCustom");
}

document.getElementById("bgSelect").addEventListener("change", (e) => {
  applyBackground(e.target.value);
});

const savedBG = localStorage.getItem("background") || "default";
document.getElementById("bgSelect").value = savedBG;
applyBackground(savedBG);

/* File upload */
document.getElementById("fileInput").addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    document.body.style.backgroundImage = `url('${e.target.result}')`;
    localStorage.setItem("backgroundCustom", e.target.result);
    localStorage.removeItem("background");
  };
  reader.readAsDataURL(file);
});

/* URL background */
function customBackgroundURL() {
  const url = prompt("Enter image URL:");
  if (!url) return;

  document.body.style.backgroundImage = `url('${url}')`;
  localStorage.setItem("backgroundCustom", url);
  localStorage.removeItem("background");
}

/* Restore */
const customBG = localStorage.getItem("backgroundCustom");
if (customBG) {
  document.body.style.backgroundImage = `url('${customBG}')`;
}
</script>

</body>
</html>
